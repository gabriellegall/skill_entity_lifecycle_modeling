version: 2

models:
  - name: int_user_status_movements_daily
    description: "This model calculates the number of users that have been acquired, churned, or resurrected for each [user_id] at daily granularity."

  - name: int_user_status_movements_daily_agg
    description: "This model aggregates user movements for each date. It can be useful for high-level reporting or data consistency checks."
    data_tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: NB_ACTIVE_USERS_PREVIOUS_DATE_INFO + NB_ACQUIRED_USERS + NB_CHURNED_USERS + NB_RESURRECTED_USERS = NB_ACTIVE_USERS_DATE_INFO
