version: 2

models:
  - name: int_user_status_snapshots_period
    description: "This model unions all period snapshot grains into a single output for each [user_id] and [time_grain]."

  - name: int_user_status_snapshots_period__weekly
    description: "This model builds weekly period snapshots incrementally for each [user_id] by scanning current and previous week data."

  - name: int_user_status_snapshots_period__monthly
    description: "This model builds monthly period snapshots incrementally for each [user_id] by scanning current and previous month data."

  - name: int_user_status_snapshots_period__quarterly
    description: "This model builds quarterly period snapshots incrementally for each [user_id] by scanning current and previous quarter data."

  - name: int_user_status_snapshots_period__yearly
    description: "This model builds yearly period snapshots incrementally for each [user_id] by scanning current and previous year data."

  - name: int_user_status_snapshots_period_agg_movements
    description: "This model calculates the number of users that have been acquired, churned, or resurrected for each [user_id] and [time_grain], built on period snapshots."
    columns:
      - name: FIRST_CHURN_DATE_INFO
        data_tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: IS NOT NULL
              config:
                where: IS_CHURNED = TRUE
      - name: FIRST_RESURRECTION_DATE_INFO
        data_tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: IS NOT NULL
              config:
                where: IS_RESURRECTED = TRUE
      - name: FIRST_ACQUISITION_DATE_INFO
        data_tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: IS NOT NULL
              config:
                where: IS_ACQUIRED = TRUE

  - name: int_user_status_snapshots_period_agg_metrics
    description: "This model aggregates user movements at the period level for each [time_grain]. It can be useful for high-level reporting or data consistency checks."
    data_tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: NB_ACTIVE_USERS_PREVIOUS_PERIOD_END + NB_ACQUIRED_USERS + NB_CHURNED_USERS + NB_RESURRECTED_USERS = NB_ACTIVE_USERS_PERIOD_END
