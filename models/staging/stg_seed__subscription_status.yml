version: 2

models:
  - name: stg_seed__subscription_status
    description: >
      Staged subscription status records. One row per user per day.
    config:
      materialized: view
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - user_id
              - date
    columns:
      - name: user_id
        description: Unique integer identifier for the user.
        data_type: integer
        data_tests:
          - not_null
      - name: date
        description: Calendar date of the subscription status record.
        data_type: date
        data_tests:
          - not_null
      - name: status
        description: Subscription status string — 'active' or 'inactive'.
        data_type: varchar
      - name: is_active
        description: >
          Boolean flag derived from `status`.
          True when status = 'active', false otherwise.
        data_type: boolean
